name: Netlify Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Netlify CLI
        run: npm install --global netlify-cli

      - name: Build & deploy preview
        id: deploy
        run: |
          RESULT=$(netlify deploy --build \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="PR #${{ github.event.number }} - ${{ github.head_ref }}" \
            --json 2>&1 || echo '{}')
          URL=$(echo "$RESULT" | grep -o '"deploy_url":"[^"]*"' | cut -d'"' -f4 | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Comment preview URL on PR
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🚀 Deploy preview valmis!',
                '',
                `**URL:** ${url}`,
                '',
                '| Sivu | Linkki |',
                '|------|--------|',
                `| Kirjautuminen | [${url}/login](${url}/login) |`,
                `| Dashboard | [${url}/](${url}/) |`,
                `| Asiakkaat | [${url}/customers](${url}/customers) |`,
                `| Uusi lasku | [${url}/invoices/new](${url}/invoices/new) |`,
              ].join('\n')
            });
